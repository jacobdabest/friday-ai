<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F.R.I.D.A.Y</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0e1a;
    color: #c8d8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Login Screen */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }
  .login-box {
    background: #0f1625;
    border: 1px solid #1e3a5f;
    border-radius: 16px;
    padding: 40px 36px;
    width: 340px;
    box-shadow: 0 0 40px rgba(13, 71, 161, 0.2);
  }
  .login-logo {
    text-align: center;
    font-size: 2.1rem;
    font-weight: 700;
    letter-spacing: 6px;
    color: #4fc3f7;
    text-shadow: 0 0 20px #4fc3f7aa;
    margin-bottom: 4px;
  }
  .login-sub {
    text-align: center;
    font-size: 0.72rem;
    color: #4a6080;
    letter-spacing: 1.5px;
    margin-bottom: 24px;
  }
  .login-box input {
    width: 100%;
    background: #0a0e1a;
    border: 1px solid #1e3a5f;
    border-radius: 8px;
    padding: 12px 14px;
    color: #c8d8f0;
    font-size: 0.95rem;
    outline: none;
    margin-bottom: 12px;
    transition: all 0.2s;
  }
  .login-box input:focus {
    border-color: #4fc3f7;
    box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.15);
  }
  .login-btn {
    width: 100%;
    background: linear-gradient(135deg, #1565c0, #0d47a1);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
    margin-top: 8px;
  }
  .login-btn:hover { opacity: 0.9; }
  #login-error {
    color: #ef5350;
    font-size: 0.85rem;
    text-align: center;
    min-height: 20px;
    margin-top: 8px;
  }

  /* Main App */
  #app { display: none; flex-direction: column; height: 100vh; }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: #0f1625;
    border-bottom: 1px solid #1e3a5f;
    flex-shrink: 0;
  }
  .logo {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: 4px;
    color: #4fc3f7;
    text-shadow: 0 0 12px #4fc3f788;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #00e676;
    box-shadow: 0 0 8px #00e676;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #username-display {
    font-size: 0.85rem;
    color: #4a6fa5;
  }

  .icon-btn {
    background: none;
    border: 1px solid #1e3a5f;
    border-radius: 8px;
    color: #4fc3f7;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 0.82rem;
  }
  .icon-btn:hover {
    background: #1e3a5f44;
    border-color: #4fc3f7;
  }

  .main { display: flex; flex: 1; overflow: hidden; }

  #sidebar {
    width: 240px;
    background: #0f1625;
    border-right: 1px solid #1e3a5f;
    padding: 16px 12px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar-section h4 {
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: #4a6080;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .sidebar-item, .note-item {
    font-size: 0.82rem;
    color: #8aaccc;
    padding: 6px 8px;
    border-radius: 6px;
    line-height: 1.45;
    margin-bottom: 4px;
  }
  .note-item {
    background: #0d1a2e;
    border-left: 3px solid #1565c0;
  }

  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  #messages::-webkit-scrollbar { width: 5px; }
  #messages::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 10px; }

  .msg {
    display: flex;
    gap: 12px;
    max-width: 80%;
  }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.friday { align-self: flex-start; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.78rem;
    font-weight: 700;
    flex-shrink: 0;
  }
  .msg.friday .avatar { background: #1565c0; color: white; }
  .msg.user .avatar { background: #1e3a5f; color: #4fc3f7; }

  .bubble {
    padding: 11px 15px;
    border-radius: 14px;
    font-size: 0.93rem;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.friday .bubble {
    background: #0f1e35;
    border: 1px solid #1e3a5f;
    border-bottom-left-radius: 4px;
  }
  .msg.user .bubble {
    background: #1565c0;
    color: white;
    border-bottom-right-radius: 4px;
  }

  .agent-action {
    font-size: 0.76rem;
    color: #4fc3f7;
    background: #0a1929;
    border: 1px solid #1e3a5f;
    border-radius: 6px;
    padding: 5px 11px;
    margin: 4px 0 8px 46px;
  }

  .typing-indicator {
    display: flex;
    gap: 5px;
    padding: 6px 0;
  }
  .typing-indicator span {
    width: 7px; height: 7px;
    background: #4fc3f7;
    border-radius: 50%;
    animation: bounce 1.3s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);} 40%{transform:translateY(-6px);} }

  .input-bar {
    padding: 14px 20px;
    background: #0f1625;
    border-top: 1px solid #1e3a5f;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #msg-input {
    flex: 1;
    background: #0a0e1a;
    border: 1px solid #1e3a5f;
    border-radius: 12px;
    padding: 12px 16px;
    color: #c8d8f0;
    font-size: 0.95rem;
    resize: none;
    outline: none;
    max-height: 130px;
    font-family: inherit;
  }
  #msg-input:focus { border-color: #4fc3f7; }

  #send-btn {
    background: linear-gradient(135deg, #1565c0, #0d47a1);
    border: none;
    border-radius: 12px;
    width: 46px; height: 46px;
    cursor: pointer;
    color: white;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #send-btn:hover { opacity: 0.9; }
  #send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">F.R.I.D.A.Y</div>
    <div class="login-sub">FULLY REALIZED INDEPENDENT DIGITAL AUTONOMOUS YOU</div>
    
    <input type="text" id="login-user" placeholder="Username" autocomplete="username">
    <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password">
    
    <button class="login-btn" onclick="doLogin()">ACCESS SYSTEM</button>
    <div id="login-error"></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">F.R.I.D.A.Y</div>
    <div class="header-right">
      <span id="username-display"></span>
      <button class="icon-btn" onclick="toggleMemory()">🧠 Memory</button>
      <button class="icon-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </header>

  <div class="main">
    <div id="sidebar">
      <div class="sidebar-section">
        <h4>📝 Notes</h4>
        <div id="notes-list"><div class="sidebar-item" style="color:#4a6080">No notes yet</div></div>
      </div>

      <div id="memory-panel" style="display:none; flex-direction:column; gap:20px;">
        <div class="sidebar-section">
          <h4>🔮 Known Facts</h4>
          <div id="facts-list"></div>
        </div>
        <div class="sidebar-section">
          <h4>⚙️ Preferences</h4>
          <div id="prefs-list"></div>
        </div>
        <div class="sidebar-section">
          <h4>🔬 Research Topics</h4>
          <div id="research-list"></div>
        </div>
      </div>
    </div>

    <div class="chat-area">
      <div id="messages"></div>
      <div class="input-bar">
        <textarea id="msg-input" rows="1" placeholder="Message FRIDAY..."></textarea>
        <button id="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
let currentUser = null;
const input = document.getElementById("msg-input");

input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 130) + "px";
});

input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

document.getElementById("login-pass").addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});

async function doLogin() {
  const username = document.getElementById("login-user").value.trim().toLowerCase();
  const password = document.getElementById("login-pass").value;
  const errEl = document.getElementById("login-error");
  errEl.textContent = "";

  if (!username || !password) {
    errEl.textContent = "Please enter username and password";
    return;
  }

  try {
    const res = await fetch("/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.success) {
      currentUser = username;
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("app").style.display = "flex";
      document.getElementById("username-display").textContent = currentUser.toUpperCase();
      addMessage("friday", data.message || "Welcome back. FRIDAY online.");
      loadMemory();
    } else {
      errEl.textContent = data.message || "Login failed";
    }
  } catch (e) {
    errEl.textContent = "Connection error";
  }
}

async function doLogout() {
  await fetch("/api/logout", { method: "POST", credentials: "include" });
  location.reload();
}

async function sendMessage() {
  const msg = input.value.trim();
  if (!msg) return;

  input.value = "";
  input.style.height = "auto";

  addMessage("user", msg);

  const btn = document.getElementById("send-btn");
  btn.disabled = true;

  const typingId = "typing-" + Date.now();
  addTyping(typingId);

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({ message: msg })
    });

    const data = await res.json();
    removeTyping(typingId);

    if (data.reply) addMessage("friday", data.reply);

    loadMemory();
  } catch (e) {
    removeTyping(typingId);
    addMessage("friday", "Connection error. Please try again.");
  }

  btn.disabled = false;
  input.focus();
}

function addMessage(role, text) {
  const container = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `msg ${role}`;

  const av = document.createElement("div");
  av.className = "avatar";
  av.textContent = role === "friday" ? "FR" : (currentUser ? currentUser[0].toUpperCase() : "U");

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;

  div.appendChild(av);
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addTyping(id) {
  const container = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "msg friday";
  div.id = id;

  const av = document.createElement("div");
  av.className = "avatar";
  av.textContent = "FR";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;

  div.appendChild(av);
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

async function loadMemory() {
  try {
    const res = await fetch("/api/memory", { credentials: "include" });
    if (!res.ok) return;
    const data = await res.json();

    const notesList = document.getElementById("notes-list");
    if (data.notes && data.notes.length) {
      notesList.innerHTML = data.notes.slice(-6).map(n => 
        `<div class="note-item">${n}</div>`
      ).join("");
    } else {
      notesList.innerHTML = '<div class="sidebar-item" style="color:#4a6080">No notes yet</div>';
    }

    document.getElementById("facts-list").innerHTML = (data.facts || []).slice(-8).map(f => 
      `<div class="sidebar-item">• ${f}</div>`
    ).join("") || '<div class="sidebar-item" style="color:#4a6080">None yet</div>';

    const prefsHtml = Object.entries(data.preferences || {}).map(([k, v]) => 
      `<div class="sidebar-item">${k}: ${v}</div>`
    ).join("");
    document.getElementById("prefs-list").innerHTML = prefsHtml || '<div class="sidebar-item" style="color:#4a6080">None yet</div>';

    document.getElementById("research-list").innerHTML = (data.research_topics || []).map(t => 
      `<div class="sidebar-item">🔬 ${t}</div>`
    ).join("") || '<div class="sidebar-item" style="color:#4a6080">None yet</div>';
  } catch (e) {}
}

function toggleMemory() {
  const panel = document.getElementById("memory-panel");
  panel.style.display = panel.style.display === "none" ? "flex" : "none";
}

// Check if already logged in
(async () => {
  try {
    const res = await fetch("/api/me", { credentials: "include" });
    if (res.ok) {
      const data = await res.json();
      if (data.logged_in) {
        currentUser = data.username;
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app").style.display = "flex";
        document.getElementById("username-display").textContent = currentUser.toUpperCase();
        addMessage("friday", "Welcome back. FRIDAY is online.");
        loadMemory();
      }
    }
  } catch (e) {}
})();
</script>
</body>
</html>
